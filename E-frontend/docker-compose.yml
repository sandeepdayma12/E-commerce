version: '3.3'

services:
  frontend:
    build:
      context: .
      dockerfile: dockerfile
      args:
        - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY}
    container_name: frontend_container
    ports:
      - "3000:80"
    environment:
      # These URLs are used by the browser to find your backend services
      # Since backends are on the same machine, we use localhost
      - VITE_AUTH_URL=http://localhost:8001/
      - VITE_CART_URL=http://localhost:8002/
      - VITE_ORDER_URL=http://localhost:8003/
      - VITE_PAYMENT_URL=http://localhost:8004/
      - VITE_PRODUCT_URL=http://localhost:8005/
      - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY}
    restart: always
